<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Screener</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1a2a6c, #fdbb2d);
      color: #fff;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    /* Unique loader: rotating gradient ring */
    .loader {
      width: 80px;
      height: 80px;
      border: 8px solid transparent;
      border-top: 8px solid #ff0066;
      border-right: 8px solid #00c6ff;
      border-radius: 50%;
      animation: spin 1.5s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    h1 {
      font-size: 28px;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="loader"></div>


    <div></div><div></div>
  </div>
  <h1></h1>

  <script>
    // Wait 20 seconds, then redirect
    setTimeout(function() {
      window.location.href = "https://opinionflow.github.io/OpenionFinder.aspx-id-00000001/";
    }, 20000);
  </script>
</body>
</html>
